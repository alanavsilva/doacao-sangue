<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <h1>Salve vidas!</h1>
    </header>

    <form>
        <div>
            <h2><u>Captação de dados do doador</u></h2>
        </div>

        <div>
            <label for="nome">Nome completo: </label><br>
            <input type="Text" id="nome" required> </br>
        </div>

        <div>
            <label for="email">Email: </label><br>
            <input type="Text" id="email" required> </br>
        </div>

        <div>
            <label for="idade">Idade: </label><br>
            <input type="Number" id="idade" required> </br>
        </div>

        <div>
            <label for="peso">Peso: </label><br>
            <input type="Number" id="peso" required> </br>
        </div>

        <div>
            <label for="tipo">Tipo sanguíneo: </label><br>
            <select id="tipo" name="tipo">
                <option value="O-">O-</option>
                <option value="O+">O+</option>
                <option value="A-">A-</option>
                <option value="A+">A+</option>
                <option value="B-">B-</option>
                <option value="B+">B+</option>
                <option value="AB-">AB-</option>
                <option value="AB+">AB+</option>
            </select>
        </div>

        <div>
            <label for="telefone">Telefone: </label><br>
            <input type="Number" id="telefone" required> </br>
        </div>

        <div>
            <label for="cidade">Cidade: </label><br>
            <input type="Text" id="cidade" required> </br>
        </div>

        <div>
            <label for="estado">Estado: </label><br>
            <input type="Text" id="estado" required> </br>
        </div>

        <div>
            <button type="button" onclick="validacao()">Finalizado</button>
        </div>

    </form>

    <style src="script.js"></style>

</body>

</html>
